    })();

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const utmParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
            if (urlParams.has('utm_source') || urlParams.has('utm_campaign')) {
                utmParams.forEach(param => {
                    const value = urlParams.get(param);
                    if (value) localStorage.setItem(param, value);
                });
            }
        })();

        var eyeOpen = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        var eyeClosed = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>';

        function togglePwd(inputId, btn) {
            var input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = eyeClosed;
            } else {
                input.type = 'password';
                btn.innerHTML = eyeOpen;
            }
        }

        function handleLogin() {
            if (window._isReturningUser) {
                var btn = document.getElementById('loginBtn');
                btn.classList.add('loading');
                btn.textContent = 'Authenticating...';
                setTimeout(function() { window.location.href = (typeof TrackingUtils!=='undefined') ? TrackingUtils.appendUTMs('dashboard.html') : 'dashboard.html'; }, 800);
                return;
            }

            var name = document.getElementById('loginName').value.trim();
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            var confirmPassword = document.getElementById('loginConfirmPassword').value;

            document.getElementById('nameError').classList.remove('visible');
            document.getElementById('emailError').classList.remove('visible');
            document.getElementById('passwordError').classList.remove('visible');
            document.getElementById('confirmError').classList.remove('visible');

            var hasError = false;

            if (!name || name.length < 2) {
                document.getElementById('nameError').classList.add('visible');
                hasError = true;
            }

            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                document.getElementById('emailError').classList.add('visible');
                hasError = true;
            }

            if (!password || password.length < 6) {
                document.getElementById('passwordError').classList.add('visible');
                hasError = true;
            }

            if (!window._isReturningUser && password !== confirmPassword) {
                document.getElementById('confirmError').classList.add('visible');
                hasError = true;
            }

            if (hasError) {
                document.querySelector('.login-form').style.animation = 'shake 0.5s';
                setTimeout(function() { document.querySelector('.login-form').style.animation = ''; }, 500);
                return;
            }

            localStorage.setItem('userName', name);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('appPassword', password);

            var visitorId = localStorage.getItem('funnelVisitorId');
            if (!visitorId) {
                visitorId = 'v_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('funnelVisitorId', visitorId);
            }

            var ZAPSPY_API_URL = window.ZAPSPY_API_URL || 'https://zapspy-funnel-production.up.railway.app';
            var leadData = {
                name: name,
                email: email,
                whatsapp: '',
                targetPhone: '',
                targetGender: '',
                country_code: localStorage.getItem('userCountryCode') || '',
                city: localStorage.getItem('userCity') || '',
                state: localStorage.getItem('userState') || '',
                pageUrl: window.location.href,
                funnelLanguage: 'en',
                funnelSource: 'login',
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                referrer: document.referrer,
                visitorId: visitorId
            };

            try {
                var fbIds = {};
                if (typeof FacebookCAPI !== 'undefined') {
                    fbIds.fbc = FacebookCAPI.getFbc();
                    fbIds.fbp = FacebookCAPI.getFbp();
                } else {
                    fbIds.fbc = localStorage.getItem('_fbc') || null;
                    fbIds.fbp = (document.cookie.match(/_fbp=([^;]+)/)||[])[1] || localStorage.getItem('_fbp') || null;
                }
                leadData.fbc = fbIds.fbc;
                leadData.fbp = fbIds.fbp;

                ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(p) {
                    leadData[p] = localStorage.getItem(p) || null;
                });
                leadData.gclid = localStorage.getItem('gclid') || null;

                fetch(ZAPSPY_API_URL + '/api/leads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(leadData)
                }).catch(function() {});
            } catch(e) {}

            if (typeof FacebookCAPI !== 'undefined') {
                FacebookCAPI.trackEvent('Lead', {
                    content_name: 'Whats Spy Login',
                    content_category: 'registration',
                    value: 47,
                    currency: 'USD'
                });
            }

            var btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
            btn.textContent = 'Authenticating...';

            setTimeout(function() {
                window.location.href = (typeof TrackingUtils!=='undefined') ? TrackingUtils.appendUTMs('dashboard.html') : 'dashboard.html';
            }, 1200);
        }

        document.querySelectorAll('.login-input').forEach(function(input) {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
        });

        (function checkReturningUser() {
            var savedName = localStorage.getItem('userName');
            var savedEmail = localStorage.getItem('userEmail');
            if (savedName && savedEmail) {
                var nameGroup = document.getElementById('loginName').closest('.input-group');
                if (nameGroup) nameGroup.style.display = 'none';
                var pwdGroup = document.getElementById('loginPassword').closest('.input-group');
                if (pwdGroup) pwdGroup.style.display = 'none';
                var confirmGroup = document.getElementById('loginConfirmPassword').closest('.input-group');
                if (confirmGroup) confirmGroup.style.display = 'none';
                document.getElementById('loginEmail').value = savedEmail;
                document.querySelector('.brand-tagline').textContent = 'Welcome back, ' + savedName.split(' ')[0] + '!';
                document.getElementById('loginBtn').textContent = 'Continue';
                window._isReturningUser = true;
            }
        })();
    </script>
    <script src="js/urgency-bar.js"></script>
</body>
</html>
