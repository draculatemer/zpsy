    <!-- Capture fbclid and poll for _fbp cookie ASAP -->
    <script>
    (function() {
        var m = window.location.search.match(/[?&]fbclid=([^&]+)/);
        if (m) {
            var fbc = 'fb.1.' + Date.now() + '.' + decodeURIComponent(m[1]);
            try { localStorage.setItem('_fbc', fbc); } catch(e) {}
        }
        var polls = 0;
        var pi = setInterval(function() {
            var c = document.cookie.match(/_fbp=([^;]+)/);
            if (c) { try { localStorage.setItem('_fbp', c[1]); } catch(e) {} clearInterval(pi); }
            if (++polls > 25) clearInterval(pi);
        }, 200);
    })();
    </script>

                    fetch('https://ipapi.co/json/').then(r => r.json()).then(function(data) {

                        if (data.country_code && !localStorage.getItem('userCountryCode')) {

                        }
                    }).catch(function() {});

        * {

            padding: 0;

        :root {

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Headline */
        .headline {
            text-align: center;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .headline h1 {
            font-size: clamp(28px, 7vw, 36px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .headline h1 span {
            color: var(--green-primary);
        }

        .headline p {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 380px;
            margin: 0 auto;
            line-height: 1.5;
            overflow-wrap: break-word;
        }

        .headline p strong {
            color: var(--red-alert);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats Badge */
        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 59, 48, 0.12);
            border: 1px solid rgba(255, 59, 48, 0.25);
            padding: 8px 16px;
            border-radius: 50px;
            margin-bottom: 24px;
            animation: pulse 2s infinite, fadeInUp 0.8s ease-out 0.3s both;
        }

        .stats-badge .dot {
            width: 8px;
            height: 8px;
            background: var(--red-alert);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .stats-badge span {
            font-size: 13px;
            color: var(--red-alert);
            font-weight: 500;
            overflow-wrap: break-word;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.3); }
            50% { box-shadow: 0 0 0 8px rgba(255, 59, 48, 0); }
        }

        /* Main Card */
        .main-card {
            background: var(--bg-card);
            border: 1px solid rgba(37, 211, 102, 0.15);
            border-radius: 20px;
            padding: 28px 24px;
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        /* Gender Selection */
        .gender-section {
            margin-bottom: 20px;
        }

        .gender-label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
            text-align: center;
        }

        .gender-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .gender-btn {

            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            background: rgba(31, 44, 51, 0.6);

            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;

        .gender-btn:hover {

            border-color: rgba(37, 211, 102, 0.3);
        }

        .gender-btn.selected {
            background: rgba(37, 211, 102, 0.15);
            border-color: var(--green-primary);
        }

        .gender-btn .icon {

            height: 50px;
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.2), rgba(18, 140, 126, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;
            opacity: 0.5;

        }

        .cta-button.active {
            opacity: 1;
            pointer-events: auto;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }

            transform: translateY(-2px);

            border-left: 3px solid #25D366;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            color: var(--text-secondary);

        }
        .micro-testimonial strong { color: var(--green-primary); }

        .trust-badge svg {
            width: 14px;
            height: 14px;
            color: var(--green-primary);
        }

        /* Users Counter */
        .users-counter {
            text-align: center;
            margin-top: 24px;
            animation: fadeInUp 0.8s ease-out 0.7s both;
        }

        .users-counter p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .users-counter strong {
            color: var(--green-primary);
            font-weight: 600;
        }

        .users-avatars {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .users-avatars .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--bg-dark);
            margin-left: -8px;
        }

        .users-avatars .avatar:first-child {

        .users-avatars .avatar-more {
            background: var(--green-primary);
            display: flex;

        /* Responsive */
        @media (max-height: 700px) {
            .container {
                padding: 15px;

                padding-top: 15px;
            }
            .headline {

            }
            .headline h1 {

            }
            .stats-badge {

            }
            .main-card {

            .trust-badges, .users-counter {

        }

        @media (max-width: 380px) {
            .main-card {

            }

                gap: 10px;
            }
            .gender-btn .icon {

        @media (max-width: 340px) {
            .stats-badge {

                font-size: 11px;
            }

                gap: 6px;
            }
            .trust-badge {
                font-size: 10px;
            }
            .gender-btn {
                padding: 12px 14px;
                gap: 10px;
            }
        }
    </style>
</head>

    <script>
        // ============================================
        // CAPTURE AND PRESERVE ORIGINAL UTMs FROM META ADS
        // ============================================
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // List of UTM parameters to capture
            const utmParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term'];
            
            // Only save if we have UTM params in URL (fresh visit from ad)
            if (urlParams.has('utm_source') || urlParams.has('utm_campaign')) {
                utmParams.forEach(param => {
                    const value = urlParams.get(param);
                    if (value) {
                        localStorage.setItem(param, value);
                    }
                });
            }
        })();
        
        // Selected gender
        let selectedGender = null;

        function selectGender(gender) {
            selectedGender = gender;
            
            document.getElementById('btnMale').classList.remove('selected');
            document.getElementById('btnFemale').classList.remove('selected');
            document.getElementById('btn' + gender.charAt(0).toUpperCase() + gender.slice(1)).classList.add('selected');
            
            document.getElementById('ctaButton').classList.add('active');
            
            localStorage.setItem('targetGender', gender);
            
            if (typeof FunnelTracker !== 'undefined') {
                FunnelTracker.track(FunnelTracker.events.GENDER_SELECTED, { gender: gender });
            }
        }

        function startSpy() {
            if (!selectedGender) {
                document.querySelector('.gender-buttons').style.animation = 'shake 0.5s';
                setTimeout(() => { document.querySelector('.gender-buttons').style.animation = ''; }, 500);
                return;
            }
            window.location.href = (typeof TrackingUtils!=='undefined') ? TrackingUtils.appendUTMs('phone.html?gender=' + selectedGender) : 'phone.html?gender=' + selectedGender;
        }

        // Keyboard support for gender buttons
        document.querySelectorAll('.gender-btn').forEach(btn => {
            btn.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    btn.click();
                }
            });
        });

        // Check URL params for pre-selected gender
        const urlParams = new URLSearchParams(window.location.search);
        const genderParam = urlParams.get('gender');
        if (genderParam === 'male' || genderParam === 'female') {
            selectGender(genderParam);
        }

        // Shake animation for validation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-5px); }
                40%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
